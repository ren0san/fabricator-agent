name: Auto Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create semantic tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_tag="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          if [ -z "$last_tag" ]; then
            last_tag="v0.0.0"
            commit_messages="$(git log --format=%B -n 100 HEAD)"
          else
            commit_messages="$(git log --format=%B "${last_tag}..HEAD")"
          fi

          bump="patch"

          if echo "$commit_messages" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]+\))?!:'; then
            bump="major"
          elif echo "$commit_messages" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          fi

          version="${last_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_tag="v${major}.${minor}.${patch}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$new_tag" -m "Release $new_tag"
          git push origin "$new_tag"

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: steps.tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          generate_release_notes: true
