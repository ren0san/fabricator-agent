name: Agent CI/CD

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      target_env:
        description: "Deployment target"
        required: true
        type: choice
        default: prod
        options:
          - test
          - prod

concurrency:
  group: deploy-agent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate syntax
        run: |
          python -m py_compile agent_main.py

  deploy_test:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'test')
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure rsync + ssh client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Start ssh-agent (test)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TEST_AGENT_SSH_PRIVATE_KEY || secrets.AGENT_SSH_PRIVATE_KEY }}

      - name: Deploy agent (test)
        env:
          SSH_USER: ${{ secrets.TEST_AGENT_SSH_USER || secrets.AGENT_SSH_USER }}
          SSH_HOST: ${{ secrets.TEST_AGENT_SSH_HOST || secrets.AGENT_SSH_HOST }}
          SSH_PORT: ${{ secrets.TEST_AGENT_SSH_PORT || secrets.AGENT_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.TEST_AGENT_DEPLOY_PATH || '/opt/fabricator-agent-src' }}
        run: |
          set -euo pipefail
          : "${SSH_USER:?Missing SSH user}"
          : "${SSH_HOST:?Missing SSH host}"
          : "${SSH_PORT:=22}"
          : "${DEPLOY_PATH:=/opt/fabricator-agent-src}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          SSH_TARGET="${SSH_USER}@${SSH_HOST}"
          ssh -p "$SSH_PORT" "$SSH_TARGET" "mkdir -p '$DEPLOY_PATH'"

          rsync -az --delete \
            --exclude '.git' --exclude '.github' --exclude '.idea' \
            --exclude '__pycache__' --exclude '*.pyc' \
            -e "ssh -p ${SSH_PORT}" \
            ./ "${SSH_TARGET}:${DEPLOY_PATH}/"

          ssh -p "$SSH_PORT" "$SSH_TARGET" "chmod +x '$DEPLOY_PATH/scripts/remote_deploy.sh' && '$DEPLOY_PATH/scripts/remote_deploy.sh' '$DEPLOY_PATH'"

  deploy_prod:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'prod')
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure rsync + ssh client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Start ssh-agent (prod)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_AGENT_SSH_PRIVATE_KEY || secrets.AGENT_SSH_PRIVATE_KEY }}

      - name: Deploy agent (prod)
        env:
          SSH_USER: ${{ secrets.PROD_AGENT_SSH_USER || secrets.AGENT_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_AGENT_SSH_HOST || secrets.AGENT_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_AGENT_SSH_PORT || secrets.AGENT_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.PROD_AGENT_DEPLOY_PATH || '/opt/fabricator-agent-src' }}
        run: |
          set -euo pipefail
          : "${SSH_USER:?Missing SSH user}"
          : "${SSH_HOST:?Missing SSH host}"
          : "${SSH_PORT:=22}"
          : "${DEPLOY_PATH:=/opt/fabricator-agent-src}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          SSH_TARGET="${SSH_USER}@${SSH_HOST}"
          ssh -p "$SSH_PORT" "$SSH_TARGET" "mkdir -p '$DEPLOY_PATH'"

          rsync -az --delete \
            --exclude '.git' --exclude '.github' --exclude '.idea' \
            --exclude '__pycache__' --exclude '*.pyc' \
            -e "ssh -p ${SSH_PORT}" \
            ./ "${SSH_TARGET}:${DEPLOY_PATH}/"

          ssh -p "$SSH_PORT" "$SSH_TARGET" "chmod +x '$DEPLOY_PATH/scripts/remote_deploy.sh' && '$DEPLOY_PATH/scripts/remote_deploy.sh' '$DEPLOY_PATH'"
